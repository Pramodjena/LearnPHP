  <head>

    <title>Get Form | PHP</title>

  <body>
    <h1>PHP Form</h1>
    <form action="./get.php" method="get">

      <br />

        name="pass"
        id="pass"
        placeholder="Enter password"

      <br />
      <input type="submit" value="Submit" />
    </form>
  </body>
